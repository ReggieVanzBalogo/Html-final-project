<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokémon Booster Pack Shop</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Pokémon Booster Pack Shop</h1>
    <div id="cart-button" class="cart">
      🛒 Cart (<span id="cart-count">0</span>)
    </div>
  </header>

  <div id="cart-dropdown" class="cart-dropdown">
    <h2>Your Cart</h2>
    <ul id="cart-items"></ul>
    <p>Total: $<span id="cart-total">0</span></p>
    <button id="checkout-btn">Checkout</button>
    <button id="close-cart-btn">Close</button>
  </div>

  <main>
    <div class="products">
      <div class="product">
        <img src="re.jpg">
        <h2>Rebel Clash Booster Pack</h2>
        <p>₱220</p>
        <input type="number" value="1" min="1" class="quantity">
        <button onclick="addToCart('Rebel Clash Booster Pack', 5, this)">Add to Cart</button>
      </div>

      <div class="product">
        <img src="sac.jpg">
        <h2>Scarlet & Violet Booster Pack</h2>
        <p>₱180</p>
        <input type="number" value="1" min="1" class="quantity">
        <button onclick="addToCart('Scarlet & Violet Booster Pack', 7, this)">Add to Cart</button>
      </div>

      <div class="product">
        <img src="si.jpg">
        <h2>Sun & Moon Booster Pack</h2>
        <p>₱250</p>
        <input type="number" value="1" min="1" class="quantity">
        <button onclick="addToCart('Sun & Moon Booster Pack', 5, this)">Add to Cart</button>
      </div>

      <div class="product">
        <img src="ev.jpg">
        <h2>XY Booster Pack</h2>
        <p>₱400</p>
        <input type="number" value="1" min="1" class="quantity">
        <button onclick="addToCart('XY Booster Pack', 5, this)">Add to Cart</button>
      </div>

      <div class="product">
        <img src="ba.jpg">
        <h2>Base Set Booster Pack</h2>
        <p>₱15k</p>
        <input type="number" value="1" min="1" class="quantity">
        <button onclick="addToCart('Base Set Booster Pack', 6, this)">Add to Cart</button>
      </div>
    </div>
  </main>

  <script>
    let count = 0;
    let total = 0;

    function addToCart(name, price, btn) {
      let qty = parseInt(btn.parentElement.querySelector(".quantity").value);

      count += qty;
      total += price * qty;

      document.getElementById("cart-count").innerText = count;
      document.getElementById("cart-total").innerText = total;

      let item = document.createElement("li");
      item.innerText = name + " x" + qty;
      document.getElementById("cart-items").appendChild(item);
    }

    document.getElementById("cart-button").onclick = () =>
      document.getElementById("cart-dropdown").style.display = "block";

    document.getElementById("close-cart-btn").onclick = () =>
      document.getElementById("cart-dropdown").style.display = "none";
	document.getElementById("checkout-btn").onclick = () => {
  if (count === 0) {
    alert("Your cart is empty!");
    return;
  }

  alert(`Checkout successful!\nTotal: $${total}`);

  count = 0;
  total = 0;
  document.getElementById("cart-count").innerText = 0;
  document.getElementById("cart-total").innerText = 0;
  document.getElementById("cart-items").innerHTML = "";
};



  </script>

</body>
</html>
